apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.eventsource.name }}-webhook
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: ci-system
    app.kubernetes.io/component: webhook-route
spec:
  # Attaches to the shared external Gateway (same pattern as per-project ci-httproute).
  # Requires the gateway listener allowedRoutes to permit namespace {{ .Values.namespace }}
  # (the existing project routes attach cross-ns, so this is typically already "From: All").
  parentRefs:
    - group: gateway.networking.k8s.io
      name: external-gateway
      namespace: gateway
      sectionName: http
    - group: gateway.networking.k8s.io
      name: external-gateway
      namespace: gateway
      sectionName: https
  hostnames:
    - {{ .Values.webhook.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.webhook.endpoint }}
      backendRefs:
        - name: {{ .Values.eventsource.name }}-eventsource-svc
          port: {{ .Values.webhook.port }}
