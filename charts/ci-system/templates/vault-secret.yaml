{{- if eq .Values.webhook.secretSource "vault" }}
# GitOps-managed webhook HMAC secret via vault-secrets-operator, mirroring the project
# chart's ci-github-secrets pattern (mount xquare-infra-kv, k8s-auth role xquare-app,
# default VaultConnection from the VSO chart).
#
# Prereq (one-off, value lives in Vault not git):
#   vault kv put xquare-infra-kv/{{ .Values.vault.path }} secret=<hmac>
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.vault.serviceAccount }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: ci-system
    app.kubernetes.io/component: vault-service-account
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: {{ .Values.vault.authName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: ci-system
    app.kubernetes.io/component: vault-auth
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: {{ .Values.vault.role }}
    serviceAccount: {{ .Values.vault.serviceAccount }}
    audiences:
      - vault
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ .Values.webhook.secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: ci-system
    app.kubernetes.io/component: vault-secret
spec:
  type: kv-v2
  mount: {{ .Values.vault.mount }}
  path: {{ .Values.vault.path }}
  destination:
    name: {{ .Values.webhook.secretName }}   # produces secret key "secret" (Vault field name)
    create: true
  refreshAfter: 1h
  vaultAuthRef: {{ .Values.vault.authName }}
{{- end }}
