# ── Central CI eventing ──────────────────────────────────────────────────────
# Namespace is fixed to the chart name (ci-system) via the k8s-resource ApplicationSet.

namespace: ci-system

webhook:
  # Public host the GitHub App webhook POSTs to (DNS → external gateway).
  host: argo-events-ci.dsmhs.kr
  endpoint: /github
  port: 12000
  # K8s secret (key "secret") holding the HMAC shared secret.
  secretName: github-central-webhook-secret
  # "vault"  → VaultStaticSecret pulls it from Vault (GitOps, like ci-github-secrets)
  # "manual" → you create the k8s secret out-of-band
  secretSource: vault

# Vault (vault-secrets-operator) — same mount/role the project chart's CI secrets use.
# The HMAC value lives in Vault, not git:  vault kv put xquare-infra-kv/ci-central-webhook secret=<hmac>
vault:
  mount: xquare-infra-kv
  path: ci-central-webhook
  role: xquare-app
  serviceAccount: ci-system-vault-sa
  authName: ci-system-infra-vault-auth

# Single central EventBus. Engine "native" mirrors the proven per-project STAN config
# (guaranteed to come up). Switch to jetstream for prod once a supported version is pinned.
eventbus:
  name: ci-central-eventbus
  engine: native            # native | jetstream
  replicas: 3
  jetstreamVersion: "2.10.10"   # only used when engine=jetstream; pin to a version the
                                # installed argo-events controller supports
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

eventsource:
  name: github-central
  eventName: webhook
  replicas: 2
  # Placeholder org only to satisfy validation (receive-only mode does NOT use it for
  # scoping — delivery scope is whatever webhook POSTs to the endpoint).
  validationOrg: team-xquare

# NOTE: per-project/per-app Sensors live in the project gitops-repo chart
# (ci-central-sensor.yaml), NOT here. This chart is central platform infra only:
# EventBus + receive-only EventSource + HTTPRoute + central sensor SA/ClusterRole + Vault.
