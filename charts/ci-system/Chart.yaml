apiVersion: v2
name: ci-system
description: |
  Centralized CI eventing for the platform: one EventBus + one receive-only GitHub
  EventSource shared by all projects. Per-project/app Sensors live in the project
  gitops-repo chart and route off this single stream. Replaces the per-app
  EventSource/Sensor + per-project EventBus footprint.
type: application
version: 0.1.0
appVersion: "v1.9.3"
